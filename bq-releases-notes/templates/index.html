<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track Google Cloud BigQuery releases and updates. Easily read, search, and Tweet about features, bug fixes, changes, and breaking updates.">
    <title>BigQuery Release Notes Tracker</title>
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo-section">
                <div class="logo-badge">BQ</div>
                <div class="logo-text">
                    <h1>BigQuery Release Notes</h1>
                    <p>Track latest features, updates, and changes</p>
                </div>
            </div>
            <div class="action-buttons">
                <button id="refresh-btn" class="btn btn-refresh" title="Refresh release notes">
                    <svg id="refresh-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89H18V4"></path>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Controls (Search & Category Filters) -->
        <div class="controls-bar">
            <div class="search-wrapper">
                <span class="search-icon">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" id="search-input" class="search-input" placeholder="Search updates, keywords, dates...">
            </div>
            
            <div class="filter-container">
                <button class="filter-chip active" data-category="All">All Updates</button>
                <button class="filter-chip" data-category="Feature">Features</button>
                <button class="filter-chip" data-category="Change">Changes</button>
                <button class="filter-chip" data-category="Breaking">Breaking</button>
                <button class="filter-chip" data-category="Issue">Issues</button>
                <button class="filter-chip" data-category="Announcement">Announcements</button>
            </div>
        </div>

        <!-- Timeline / Content Container -->
        <main>
            <!-- Timeline Rendered by JS -->
            <div id="timeline" class="timeline" style="display: none;"></div>

            <!-- Loading Skeleton States -->
            <div id="loading-state" class="loading-bars">
                <div class="timeline-group">
                    <div class="timeline-header">
                        <div class="timeline-dot" style="background-color: rgba(30, 41, 59, 0.4); border-color: rgba(255, 255, 255, 0.05);"></div>
                        <div class="skeleton" style="width: 150px; height: 35px; border-radius: 10px;"></div>
                    </div>
                    <div class="timeline-items" style="margin-top: 15px;">
                        <div class="skeleton"></div>
                        <div class="skeleton" style="height: 180px;"></div>
                    </div>
                </div>
                <div class="timeline-group" style="margin-top: 30px;">
                    <div class="timeline-header">
                        <div class="timeline-dot" style="background-color: rgba(30, 41, 59, 0.4); border-color: rgba(255, 255, 255, 0.05);"></div>
                        <div class="skeleton" style="width: 130px; height: 35px; border-radius: 10px;"></div>
                    </div>
                    <div class="timeline-items" style="margin-top: 15px;">
                        <div class="skeleton" style="height: 140px;"></div>
                    </div>
                </div>
            </div>

            <!-- Error State -->
            <div id="error-state" class="state-message error-state" style="display: none;">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 16px; color: var(--color-breaking);">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <h3>Error Loading Release Notes</h3>
                <p id="error-message">Failed to load the feed from Google Cloud. Please try again.</p>
                <button class="btn btn-primary" onclick="window.location.reload()">Retry Connection</button>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="state-message" style="display: none;">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: 16px; color: var(--text-muted);">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <h3>No Release Notes Found</h3>
                <p>Try adjusting your filters or search keywords to find updates.</p>
            </div>
        </main>
    </div>

    <!-- Floating Tweet Composer Modal -->
    <div id="tweet-modal" class="tweet-modal">
        <div class="tweet-composer">
            <div class="tweet-content-preview">
                <div class="tweet-label">
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path>
                    </svg>
                    <span>Tweet Composer</span>
                </div>
                <textarea id="tweet-text-area" class="tweet-text-area" maxlength="280" placeholder="Compose your tweet..."></textarea>
            </div>
            <div class="tweet-actions-wrapper">
                <span id="tweet-char-count" class="tweet-char-count">280 chars left</span>
                <button id="btn-send-tweet" class="btn btn-tweet">Tweet Update</button>
                <button id="btn-close-composer" class="btn-close-composer">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
